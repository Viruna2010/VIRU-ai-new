<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 30px auto; padding: 15px; }
        #chat-box { height: 300px; border: 2px solid #ddd; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 10px; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Gemini AI Bot</h2>
    <div id="chat-box"></div>
    <input type="text" id="userInput" placeholder="Prashnayak ahanna...">
    <button onclick="getAIResponse()">Yavanna</button>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.sh/@google/generative-ai";

        const API_KEY = "AIzaSyB3piJdX-geN9selkzgRZAc06ZMhFAPehk";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.getAIResponse = async () => {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chat-box");
            const userText = input.value;
            
            if (!userText) return;

            chatBox.innerHTML += `<p><b>Oba:</b> ${userText}</p>`;
            input.value = "";

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(userText);
                chatBox.innerHTML += `<p><b>AI:</b> ${result.response.text()}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<p style="color:red;">Error: ${error.message}</p>`;
            }
        };
    </script>
</body>
</html>
