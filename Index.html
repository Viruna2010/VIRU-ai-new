<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        #chat-box { height: 350px; border: 1px solid #ddd; overflow-y: scroll; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #f9f9f9; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Gemini AI Chat</h2>
    <div id="chat-box"></div>
    <input type="text" id="userInput" placeholder="ඔබේ ප්‍රශ්නය...">
    <button onclick="getAIResponse()">යවන්න</button>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyB3piJdX-geN9selkzgRZAc06ZMhFAPehk";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.getAIResponse = async () => {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chat-box");
            const userText = input.value;
            
            if (!userText.trim()) return;

            chatBox.innerHTML += `<p><b>ඔබ:</b> ${userText}</p>`;
            input.value = "";

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(userText);
                chatBox.innerHTML += `<p><b>AI:</b> ${result.response.text()}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<p style="color:red;">දෝෂයක් සිදුවිය: ${error.message}</p>`;
            }
        };
    </script>
</body>
</html>
