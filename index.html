<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxila AI Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center py-10 px-4">

    <div class="max-w-3xl w-full text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">TAXILA AI NEXUS</h1>
        <p class="text-gray-400 uppercase tracking-widest text-sm">Taxila Central College, Horana - Intelligent Assistant</p>
    </div>

    <div class="max-w-2xl w-full bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl">
        <div id="chat-container" class="h-96 overflow-y-auto mb-6 space-y-4 pr-4 chat-scroll">
            <div class="bg-slate-800 p-4 rounded-2xl rounded-bl-none text-gray-300 w-fit">
                ආයුබෝවන්! මම ටක්සිලා විද්‍යාලයේ AI සහායකයා. ඔබට දැනගන්න ඕන දේ අසන්න.
            </div>
        </div>
        
        <div class="flex gap-2">
            <input type="text" id="user-input" class="flex-1 bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none focus:border-blue-500 transition" placeholder="ප්‍රශ්නයක් අසන්න...">
            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 px-6 py-4 rounded-2xl font-bold transition flex items-center">
                යොමු කරන්න
            </button>
        </div>
    </div>

    <script>
        // අලුත් API Key එක මෙතන දාන්න (පරණ එක Delete කළා නේද?)
        const API_KEY = "AQ.Ab8RN6Ltff164w9dkmPkA7G2lgh0QYiT5aBatG2N0eJ96XW1vw"; 

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const text = input.value.trim();
            if (!text) return;

            container.innerHTML += `<div class="bg-blue-600 p-4 rounded-2xl rounded-br-none ml-auto w-fit">${text}</div>`;
            input.value = "";
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                container.innerHTML += `<div class="bg-slate-800 p-4 rounded-2xl rounded-bl-none text-gray-300 w-fit">${reply}</div>`;
            } catch (e) {
                container.innerHTML += `<div class="text-red-400 p-2 text-sm">Error: පද්ධතියේ දෝෂයක්.</div>`;
            }
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
