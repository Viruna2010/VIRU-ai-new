<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Gemini AI Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; }
        #chat-box { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        input { width: 75%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>

    <h2>Gemini AI Chatbot</h2>
    <div id="chat-box"></div>
    <input type="text" id="userInput" placeholder="ප්‍රශ්නයක් අසන්න...">
    <button onclick="getAIResponse()">යවන්න</button>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // ඔබේ API Key එක මෙතැනට ඇතුළත් කර ඇත
        const API_KEY = "AIzaSyB3piJdX-geN9selkzgRZAc06ZMhFAPehk"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.getAIResponse = async () => {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chat-box");
            const userText = input.value;
            
            if (!userText) return;

            chatBox.innerHTML += `<p><b>ඔබ:</b> ${userText}</p>`;
            input.value = "";

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(userText);
                const response = await result.response;
                chatBox.innerHTML += `<p><b>AI:</b> ${response.text()}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<p style="color:red;">දෝෂයක් සිදුවිය: ${error.message}</p>`;
            }
        };
    </script>
</body>
</html>
