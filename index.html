<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxila AI Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center py-10 px-4">

    <div class="max-w-3xl w-full text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">TAXILA AI NEXUS</h1>
        <p class="text-gray-400 uppercase tracking-widest text-sm">Taxila Central College, Horana</p>
    </div>

    <div class="max-w-2xl w-full bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl">
        <div id="chat-container" class="h-96 overflow-y-auto mb-6 space-y-4 pr-4">
            <div class="bg-slate-800 p-4 rounded-2xl text-gray-300 w-fit">Taxila AI Nexus සූදානම්... ප්‍රශ්නයක් අසන්න.</div>
        </div>
        
        <div class="flex gap-2">
            <input type="text" id="user-input" class="flex-1 bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none focus:border-blue-500" placeholder="ප්‍රශ්නය...">
            <button onclick="handleSend()" class="bg-blue-600 hover:bg-blue-500 px-6 py-4 rounded-2xl font-bold">යොමු කරන්න</button>
        </div>
    </div>

    <script>
        const MAIN_API_KEY = "YOUR_NEW_GEMINI_KEY"; // මෙතන අලුත් Key එක දාන්න
        const BACKUP_API_URL = "https://yw85opafq6.execute-api.us-east-1.amazonaws.com/default/boss_mode_15aug";

        async function handleSend() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const text = input.value.trim();
            if (!text) return;

            container.innerHTML += `<div class="bg-blue-600 p-4 rounded-2xl ml-auto w-fit text-sm">${text}</div>`;
            input.value = "";

            try {
                // 1. උත්සාහ කරන්න Main API එකෙන්
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MAIN_API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                if (!response.ok) throw new Error("Main API Failed");
                const data = await response.json();
                container.innerHTML += `<div class="bg-slate-800 p-4 rounded-2xl text-gray-300 w-fit text-sm">${data.candidates[0].content.parts[0].text}</div>`;
            } catch (e) {
                // 2. Main API එක වැඩ නැත්නම් Backup API එක පාවිච්චි කරන්න
                try {
                    const res = await fetch(BACKUP_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ message: text })
                    });
                    const data = await res.json();
                    container.innerHTML += `<div class="bg-slate-800 p-4 rounded-2xl text-emerald-400 w-fit text-sm">${data.reply || "Backup පද්ධතිය හරහා උත්තරයක් ලැබුණි."}</div>`;
                } catch (err) {
                    container.innerHTML += `<div class="text-red-400 text-sm">Error: පද්ධති දෙකම කාර්යබහුලයි.</div>`;
                }
            }
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
