<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Exhibition AI Bot</title>
</head>
<body>
    <h2>Exhibition AI Chat</h2>
    <div id="chat-box" style="height:300px; border:1px solid #ccc; padding:10px; overflow-y:scroll;"></div>
    <input type="text" id="userInput" placeholder="ප්‍රශ්නයක් අසන්න...">
    <button onclick="sendRequest()">යවන්න</button>

    <script>
        async function sendRequest() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chat-box");
            const text = input.value;
            if (!text) return;

            chatBox.innerHTML += `<p><b>ඔබ:</b> ${text}</p>`;
            input.value = "";

            try {
                // ඔබ ලබා දුන් API URL එක
                const response = await fetch("https://yw85opafq6.execute-api.us-east-1.amazonaws.com/default/boss_mode_15aug", {
                    method: 'POST',
                    mode: 'no-cors', // CORS දෝෂය වළක්වා ගැනීමට මෙය එකතු කර ඇත
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });

                // no-cors mode එකේදී response එක සම්පූර්ණයෙන් කියවිය නොහැක, 
                // නමුත් එය සාර්ථකව යැවුණි නම් පහත පණිවිඩය පෙන්වයි
                chatBox.innerHTML += `<p><b>AI:</b> පණිවිඩය යවන ලදි. (ප්‍රතිචාරය සැකසෙමින් පවතී...)</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.innerHTML += `<p style="color:red;">දෝෂයක් සිදුවිය: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>
