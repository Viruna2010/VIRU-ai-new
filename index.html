<!DOCTYPE html>
<html lang="en">
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>Taxila AI Assistant</h2>
        <input type="text" id="promptInput" placeholder="ප්‍රශ්නයක් අහන්න...">
        <button onclick="getTaxilaResponse()">Send</button>
        <div id="result" style="margin-top: 20px; font-weight: bold;"></div>
    </div>

    <script>
        async function getTaxilaResponse() {
            const prompt = document.getElementById('promptInput').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerText = "Taxila පිළිතුරු සපයයි...";

            // API එකට යවන ලින්ක් එක (prompt එක URL එකට දාලා)
            const apiUrl = `https://api-sand-six-30.vercel.app/api/chat?prompt=${encodeURIComponent(prompt)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                // API එකෙන් එන 'reply' කියන කොටස විතරක් පෙන්නනවා
                resultDiv.innerText = data.reply;
            } catch (error) {
                resultDiv.innerText = "Error: API එකෙන් උත්තරයක් ආවේ නෑ.";
            }
        }
    </script>
</body>
</html>
