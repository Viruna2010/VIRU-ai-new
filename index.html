<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Taxila AI</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: #1e293b; padding: 25px; border-radius: 12px; width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #38bdf8; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #res { margin-top: 20px; color: #cbd5e1; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Taxila AI</h2>
        <input type="text" id="userInput" placeholder="ප්‍රශ්නයක් අහන්න...">
        <button onclick="askTaxila()">Send</button>
        <div id="res">ප්‍රතිඵලය මෙතන පෙනේ...</div>
    </div>

    <script>
        async function askTaxila() {
            const input = document.getElementById('userInput').value;
            const resDiv = document.getElementById('res');
            resDiv.innerText = "සිතමින් සිටී...";

            try {
                // කෙලින්ම Main API එකට රික්වෙස්ට් එක යනවා
                const response = await fetch('https://yw85opafq6.execute-api.us-east-1.amazonaws.com/default/boss_mode_15aug', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: input })
                });
                
                const data = await response.json();
                resDiv.innerText = data.reply || JSON.stringify(data);
            } catch (err) {
                resDiv.innerText = "Error: API එක සම්බන්ධ කළ නොහැක.";
            }
        }
    </script>
</body>
</html>
