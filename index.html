<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>API Chatbot</title>
</head>
<body>
    <h2>AI Chatbot</h2>
    <div id="chat-box" style="height:300px; border:1px solid #ccc; overflow-y:scroll; margin-bottom:10px; padding:10px;"></div>
    <input type="text" id="userInput" placeholder="ප්‍රශ්නයක් අසන්න...">
    <button onclick="fetchFromAPI()">යවන්න</button>

    <script>
        async function fetchFromAPI() {
            const input = document.getElementById("userInput");
            const box = document.getElementById("chat-box");
            const userText = input.value;
            
            if (!userText) return;

            box.innerHTML += `<p><b>ඔබ:</b> ${userText}</p>`;
            input.value = "";

            try {
                // ඔබ දුන් URL එක හරහා API ඉල්ලීම යැවීම
                const response = await fetch("https://yw85opafq6.execute-api.us-east-1.amazonaws.com/default/boss_mode_15aug", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userText })
                });

                const data = await response.json();
                
                // API එකෙන් ලැබෙන පිළිතුර පෙන්වීම
                box.innerHTML += `<p><b>AI:</b> ${data.message || JSON.stringify(data)}</p>`;
                box.scrollTop = box.scrollHeight;
            } catch (err) {
                box.innerHTML += `<p style="color:red;">දෝෂයක් සිදුවිය: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>
