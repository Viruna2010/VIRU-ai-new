<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULA AI | Exhibition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 90%; max-width: 500px; background: #16213e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #4ecca3; margin-top: 0; }
        #chat-box { height: 350px; overflow-y: auto; margin-bottom: 15px; padding: 10px; background: #0f3460; border-radius: 10px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; }
        .user { background: #4ecca3; color: #000; text-align: right; margin-left: 50px; }
        .ai { background: #533483; margin-right: 50px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: none; outline: none; }
        button { padding: 10px 20px; border-radius: 10px; border: none; background: #4ecca3; color: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>SULA AI 🩷</h2>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="ප්‍රශ්නයක් අසන්න...">
        <button onclick="askSula()">යවන්න</button>
    </div>
</div>

<script>
    async function askSula() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chat-box");
        const text = input.value;
        if (!text.trim()) return;

        chatBox.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // ඔබ දුන් API එකට Request එක යැවීම
            const response = await fetch(`https://yw85opafq6.execute-api.us-east-1.amazonaws.com/default/boss_mode_15aug?text=${encodeURIComponent(text)}`);
            const result = await response.json();

            // SULA AI පිළිතුර පෙන්වීම
            chatBox.innerHTML += `<div class="msg ai">${result.message || result.reply || "SULA 🩷 - මට තේරුණේ නැහැ මිහිරියෝ.."}</div>`;
        } catch (err) {
            chatBox.innerHTML += `<div class="msg ai" style="color:red;">සමාවන්න, තාක්ෂණික දෝෂයක්.. 😌</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
